<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chroniken des vergessenen Weges</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%2314100c'/%3E%3Cpath d='M32 8 L38 26 L56 32 L38 38 L32 56 L26 38 L8 32 L26 26 Z' fill='%23d9b65a'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/style.css?v=20260623e">
</head>
<body>

  <!-- ══ UPDATE-BANNER: neue Version verfügbar ═══════════════════ -->
  <div id="update-banner" class="hidden" onclick="saveAndReload()">
    ✦ Neue Version verfügbar — Klicken zum Speichern &amp; Neu laden
  </div>

  <!-- ══ TOAST-CONTAINER: ephemere Reaktionstexte, oben rechts ══ -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ══ DIALOG-OVERLAY: einmalige Story-Momente, modal ══════════ -->
  <div id="dialog-overlay" class="dialog-overlay hidden">
    <div class="dialog-box" id="dialog-box" role="dialog" aria-modal="true">
      <div class="dialog-title" id="dialog-title"></div>
      <div class="dialog-text" id="dialog-text"></div>
      <div class="dialog-actions" id="dialog-actions"></div>
    </div>
  </div>

  <!-- ══ RESET-OVERLAY: bildschirmfüllende Übergangs-Animation beim
       manuellen Neuanfang (siehe experience.js, playResetAnimation()) ══ -->
  <div id="reset-overlay" class="reset-overlay hidden">
    <div class="reset-overlay-text" id="reset-overlay-text"></div>
  </div>

  <div id="app">

    <!-- ══ MOBILE: Top-Bar (≤768px) — Hamburger + Titel + Charakter-Toggle ══ -->
    <div id="mobile-top-bar">
      <button class="mobile-top-btn" id="mobile-nav-toggle" onclick="toggleMobileNav()" aria-label="Navigation öffnen">☰</button>
      <span class="mobile-title">Chroniken</span>
      <button class="mobile-top-btn" id="mobile-stats-toggle" onclick="toggleMobileStats()" aria-label="Charakter öffnen">◈</button>
    </div>
    <div id="mobile-backdrop" onclick="closeMobilePanels()"></div>

    <!-- ══ LINKE SPALTE: NAVIGATION ══════════════════════════ -->
    <nav id="nav-panel" class="panel">

      <!-- Game Branding -->
      <div id="game-branding">
        <div class="game-title">Chroniken</div>
        <div class="game-subtitle">des vergessenen Weges</div>
      </div>

      <!-- Panel-Header -->
      <div class="panel-header">
        <span class="panel-label">Navigation</span>
      </div>

      <!-- Dynamischer Nav-Inhalt (wird per JS ersetzt) -->
      <div id="nav-content" class="nav-content">
        <!-- renderNav() -->
      </div>

      <!-- Einstellungen — permanent am unteren Rand fixiert -->
      <div class="nav-footer">
        <button class="nav-footer-btn" id="btn-settings" onclick="showSettings()">
          ⚙ Einstellungen
        </button>
      </div>

    </nav>

    <!-- ══ MITTLERE SPALTE: INTERAKTIVER FEATURE-BEREICH ══════ -->
    <main id="main-panel" class="panel">
      <section id="content-section">
        <div id="content-area">
          <!-- renderContent() -->
        </div>
      </section>
    </main>

    <!-- ══ RECHTE SPALTE: CHARAKTER-STATS ════════════════════ -->
    <aside id="stats-panel" class="panel">
      <div class="panel-header">
        <span class="panel-label">Charakter</span>
      </div>
      <div id="stats-content">
        <!-- renderStats() -->
      </div>
      <div id="stat-floats"></div>
    </aside>

    <!-- ══ UNTERE LEISTE: AKTUELLES ZIEL, immer sichtbar ══════ -->
    <footer id="objective-bar">
      <div class="objective-left">
        <button class="objective-chronik-btn" id="objective-chronik-btn" onclick="showContent('chronik')" title="Chronik öffnen">📜</button>
        <span class="objective-chapter" id="objective-chapter"></span>
        <span class="objective-divider"></span>
        <span class="objective-icon">◈</span>
        <span class="objective-label">Ziel:</span>
        <span class="objective-text" id="objective-text"></span>
      </div>
      <div class="objective-right">
        <span class="objective-clock" id="objective-clock"></span>
      </div>
    </footer>

  </div><!-- /#app -->

  <script src="script/state.js?v=20260623e"></script>
  <script src="script/version-check.js?v=20260623e"></script>
  <script src="script/clock.js?v=20260623e"></script>
  <script src="script/needs.js?v=20260623e"></script>
  <script src="script/story.js?v=20260623e"></script>
  <script src="script/market.js?v=20260623e"></script>
  <script src="script/inventory.js?v=20260623e"></script>
  <script src="script/pets.js?v=20260623e"></script>
  <script src="script/toast.js?v=20260623e"></script>
  <script src="script/dialog.js?v=20260623e"></script>
  <script src="script/npc.js?v=20260623e"></script>
  <script src="script/quests.js?v=20260623e"></script>
  <script src="script/achievements.js?v=20260623e"></script>
  <script src="script/experience.js?v=20260623e"></script>
  <script src="script/lehrer.js?v=20260623e"></script>
  <script src="script/combat.js?v=20260623e"></script>
  <script src="script/automation.js?v=20260623e"></script>
  <script src="script/expedition.js?v=20260623e"></script>
  <script src="script/alchemie.js?v=20260623e"></script>
  <script src="script/dev.js?v=20260623e"></script>
  <script src="script/objective.js?v=20260623e"></script>
  <script src="script/nav.js?v=20260623e"></script>
  <script src="script/content.js?v=20260623e"></script>
  <script src="script/stats.js?v=20260623e"></script>
  <script src="script/actions.js?v=20260623e"></script>
  <script src="script/save.js?v=20260623e"></script>
  <script src="script/audio.js?v=20260623e"></script>
  <script src="script/main.js?v=20260623e"></script>
</body>
</html>
