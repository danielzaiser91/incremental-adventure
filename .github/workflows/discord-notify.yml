name: Discord Notifications

on:
  push:
    branches: [main]
    paths:
      - 'patchnotes/pending-patchnotes.md'
      - 'patchnotes/pending-status.md'

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Welche Dateien haben sich geändert?
        id: changed
        run: |
          git diff --name-only HEAD~1 HEAD > /tmp/changed.txt
          cat /tmp/changed.txt
          grep -q 'patchnotes/pending-patchnotes.md' /tmp/changed.txt \
            && echo "patchnotes=true" >> $GITHUB_OUTPUT \
            || echo "patchnotes=false" >> $GITHUB_OUTPUT
          grep -q 'patchnotes/pending-status.md' /tmp/changed.txt \
            && echo "status=true" >> $GITHUB_OUTPUT \
            || echo "status=false" >> $GITHUB_OUTPUT

      - name: Warten auf GitHub Pages
        if: steps.changed.outputs.patchnotes == 'true' || steps.changed.outputs.status == 'true'
        run: sleep 120

      - name: Discord IDs aus Datei laden
        id: ids
        run: |
          IDS_FILE="patchnotes/.discord-ids.json"
          if [ -f "$IDS_FILE" ]; then
            echo "patchnotes_msg_id=$(jq -r '.patchnotes_message_id // empty' "$IDS_FILE")" >> $GITHUB_OUTPUT
            echo "patchnotes_last_ver=$(jq -r '.patchnotes_last_version // empty' "$IDS_FILE")" >> $GITHUB_OUTPUT
            echo "status_msg_id=$(jq -r '.status_message_id // empty' "$IDS_FILE")" >> $GITHUB_OUTPUT
          else
            echo "patchnotes_msg_id=" >> $GITHUB_OUTPUT
            echo "patchnotes_last_ver=" >> $GITHUB_OUTPUT
            echo "status_msg_id=" >> $GITHUB_OUTPUT
          fi

      # ── Patchnotes → #patchnotes ─────────────────────────────────────────────
      # Gleiche Version + gespeicherte ID → PATCH (kein Ping)
      # Neue Version oder PATCH fehlgeschlagen → alte löschen + POST (mit @Patchnotes)
      - name: Patchnotes an Discord senden
        if: steps.changed.outputs.patchnotes == 'true'
        id: patchnotes_send
        run: |
          VERSION=$(head -1 patchnotes/pending-patchnotes.md | grep -oP '(?<=<!-- version: )[^>]+(?= -->)' || true)
          CONTENT=$(tail -n +2 patchnotes/pending-patchnotes.md)
          LAST_VERSION="${{ steps.ids.outputs.patchnotes_last_ver }}"
          EXISTING_ID="${{ steps.ids.outputs.patchnotes_msg_id }}"
          SUCCESS=false
          NEW_ID=""

          if [ -n "$VERSION" ] && [ "$VERSION" = "$LAST_VERSION" ] && [ -n "$EXISTING_ID" ]; then
            echo "Selbe Version ($VERSION), versuche PATCH auf $EXISTING_ID..."
            PAYLOAD=$(jq -n --arg c "$CONTENT" '{content: $c}')
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "${{ secrets.DISCORD_WEBHOOK_PATCHNOTES }}/messages/${EXISTING_ID}")
            if [ "$HTTP" = "200" ]; then
              echo "Patchnotes v$VERSION per PATCH aktualisiert."
              SUCCESS=true
            else
              echo "PATCH fehlgeschlagen (HTTP $HTTP), ersetze Nachricht."
            fi
          else
            echo "Neue Version oder keine ID gespeichert — ersetze Nachricht."
          fi

          if [ "$SUCCESS" = "false" ]; then
            # Alte Nachricht löschen (Webhook kann nur eigene Nachrichten löschen)
            if [ -n "$EXISTING_ID" ]; then
              curl -s -o /dev/null -X DELETE \
                "${{ secrets.DISCORD_WEBHOOK_PATCHNOTES }}/messages/${EXISTING_ID}" || true
              echo "Alte Nachricht $EXISTING_ID gelöscht."
            fi
            PAYLOAD=$(jq -n --arg c "<@&1518368928370528256>
          ${CONTENT}" '{content: $c}')
            RESP=$(curl -s -X POST \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "${{ secrets.DISCORD_WEBHOOK_PATCHNOTES }}?wait=true")
            NEW_ID=$(echo "$RESP" | jq -r '.id // empty')
            if [ -n "$NEW_ID" ]; then
              echo "Patchnotes v${VERSION:-unbekannt} neu gepostet: $NEW_ID"
            else
              echo "FEHLER beim Posten: $RESP"
            fi
          fi

          echo "new_id=$NEW_ID" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ── Status → #status (immer nur eine Nachricht) ──────────────────────────
      - name: Status in Discord aktualisieren
        if: steps.changed.outputs.status == 'true'
        id: status_send
        run: |
          CONTENT=$(cat patchnotes/pending-status.md)
          PAYLOAD=$(jq -n --arg c "$CONTENT" '{content: $c}')
          EXISTING_ID="${{ steps.ids.outputs.status_msg_id }}"
          SUCCESS=false
          NEW_ID=""

          if [ -n "$EXISTING_ID" ]; then
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "${{ secrets.DISCORD_WEBHOOK_STATUS }}/messages/${EXISTING_ID}")
            if [ "$HTTP" = "200" ]; then
              echo "Status-Nachricht $EXISTING_ID per PATCH aktualisiert."
              SUCCESS=true
            else
              echo "PATCH fehlgeschlagen (HTTP $HTTP), ersetze Nachricht."
            fi
          fi

          if [ "$SUCCESS" = "false" ]; then
            # Alte Nachricht löschen bevor neu gepostet wird
            if [ -n "$EXISTING_ID" ]; then
              curl -s -o /dev/null -X DELETE \
                "${{ secrets.DISCORD_WEBHOOK_STATUS }}/messages/${EXISTING_ID}" || true
              echo "Alte Status-Nachricht $EXISTING_ID gelöscht."
            fi
            RESP=$(curl -s -X POST \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "${{ secrets.DISCORD_WEBHOOK_STATUS }}?wait=true")
            NEW_ID=$(echo "$RESP" | jq -r '.id // empty')
            if [ -n "$NEW_ID" ]; then
              echo "Neue Status-Nachricht erstellt: $NEW_ID"
            else
              echo "FEHLER beim Posten: $RESP"
            fi
          fi

          echo "new_id=$NEW_ID" >> $GITHUB_OUTPUT

      # ── IDs speichern + Patchnotes archivieren ───────────────────────────────
      - name: IDs speichern und Patchnotes archivieren
        if: steps.changed.outputs.patchnotes == 'true' || steps.changed.outputs.status == 'true'
        run: |
          IDS_FILE="patchnotes/.discord-ids.json"
          CURRENT=$(cat "$IDS_FILE" 2>/dev/null || echo '{}')

          PATCHNOTES_NEW_ID="${{ steps.patchnotes_send.outputs.new_id }}"
          PATCHNOTES_VERSION="${{ steps.patchnotes_send.outputs.version }}"
          STATUS_NEW_ID="${{ steps.status_send.outputs.new_id }}"

          if [ -n "$PATCHNOTES_NEW_ID" ]; then
            CURRENT=$(echo "$CURRENT" | jq \
              --arg id "$PATCHNOTES_NEW_ID" \
              --arg v "$PATCHNOTES_VERSION" \
              '. + {patchnotes_message_id: $id, patchnotes_last_version: $v}')
          fi
          if [ -n "$STATUS_NEW_ID" ]; then
            CURRENT=$(echo "$CURRENT" | jq \
              --arg id "$STATUS_NEW_ID" \
              '. + {status_message_id: $id}')
          fi

          echo "$CURRENT" > "$IDS_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$IDS_FILE"

          if [ "${{ steps.changed.outputs.patchnotes }}" = "true" ]; then
            VERSION=$(head -1 patchnotes/pending-patchnotes.md | grep -oP '(?<=<!-- version: )[^>]+(?= -->)' || echo "unknown")
            cp patchnotes/pending-patchnotes.md "patchnotes/v${VERSION}.md"
            git add "patchnotes/v${VERSION}.md"
          fi

          git diff --staged --quiet || git commit -m "chore: discord IDs + patchnotes-archiv aktualisiert [skip ci]"
          git push
