name: Discord Notifications

on:
  push:
    branches: [main]
    paths:
      - 'patchnotes/pending-patchnotes.md'
      - 'patchnotes/pending-status.md'

permissions:
  contents: write   # für git push (Archiv)
  actions: write    # für STATUS_MESSAGE_ID Variable

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Welche Dateien haben sich geändert?
        id: changed
        run: |
          git diff --name-only HEAD~1 HEAD > /tmp/changed.txt
          cat /tmp/changed.txt
          grep -q 'patchnotes/pending-patchnotes.md' /tmp/changed.txt \
            && echo "patchnotes=true" >> $GITHUB_OUTPUT \
            || echo "patchnotes=false" >> $GITHUB_OUTPUT
          grep -q 'patchnotes/pending-status.md' /tmp/changed.txt \
            && echo "status=true" >> $GITHUB_OUTPUT \
            || echo "status=false" >> $GITHUB_OUTPUT

      - name: Version aus content.js lesen
        id: version
        run: |
          VERSION=$(grep -oP '(?<=info-value">)[0-9]+\.[0-9]+\.[0-9]+' script/content.js | head -1)
          echo "current=$VERSION" >> $GITHUB_OUTPUT

      - name: Warten auf GitHub Pages
        if: steps.changed.outputs.patchnotes == 'true' || steps.changed.outputs.status == 'true'
        run: sleep 120

      # ── Patchnotes → #patchnotes (immer neue Nachricht, mit @Mention) ──────
      - name: Patchnotes an Discord senden
        if: steps.changed.outputs.patchnotes == 'true'
        run: |
          CONTENT=$(cat patchnotes/pending-patchnotes.md)
          PAYLOAD=$(jq -n --arg c "<@&1518368928370528256>
          ${CONTENT}" '{content: $c}')
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${{ secrets.DISCORD_WEBHOOK_PATCHNOTES }}"

      # ── Status → #status (persistente Nachricht editieren) ──────────────────
      - name: Status in Discord aktualisieren
        if: steps.changed.outputs.status == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONTENT=$(cat patchnotes/pending-status.md)
          PAYLOAD=$(jq -n --arg c "${CONTENT}" '{content: $c}')
          EXISTING_ID="${{ vars.STATUS_MESSAGE_ID }}"
          SUCCESS=false

          if [ -n "$EXISTING_ID" ]; then
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "${{ secrets.DISCORD_WEBHOOK_STATUS }}/messages/${EXISTING_ID}")
            [ "$HTTP" = "200" ] && SUCCESS=true && echo "Status-Nachricht $EXISTING_ID aktualisiert."
            [ "$HTTP" != "200" ] && echo "PATCH fehlgeschlagen (HTTP $HTTP), erstelle neue Nachricht."
          fi

          if [ "$SUCCESS" = "false" ]; then
            RESP=$(curl -s -X POST \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "${{ secrets.DISCORD_WEBHOOK_STATUS }}?wait=true")
            NEW_ID=$(echo "$RESP" | jq -r '.id // empty')
            if [ -n "$NEW_ID" ]; then
              gh api --method PATCH \
                "repos/${{ github.repository }}/actions/variables/STATUS_MESSAGE_ID" \
                -f value="$NEW_ID" 2>/dev/null || \
              gh api --method POST \
                "repos/${{ github.repository }}/actions/variables" \
                -f name="STATUS_MESSAGE_ID" -f value="$NEW_ID"
              echo "Neue Status-Nachricht erstellt: $NEW_ID"
            fi
          fi

      # ── Patchnotes archivieren ───────────────────────────────────────────────
      - name: Patchnotes archivieren
        if: steps.changed.outputs.patchnotes == 'true'
        run: |
          VERSION="${{ steps.version.outputs.current }}"
          cp patchnotes/pending-patchnotes.md "patchnotes/v${VERSION}.md"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "patchnotes/v${VERSION}.md"
          git commit -m "chore: archive patchnotes v${VERSION} [skip ci]"
          git push
