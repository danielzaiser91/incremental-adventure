name: Discord Release Notification

on:
  push:
    branches: [main]
    paths:
      - 'patchnotes/pending.md'

permissions:
  contents: write   # für git push (Archive)
  actions: write    # für STATUS_MESSAGE_ID Variable lesen/schreiben

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine channel from pending.md
        id: channel
        run: |
          CHANNEL=$(head -1 patchnotes/pending.md | grep -oP '(?<=channel: )\w+' || echo "status")
          VERSION=$(grep -oP '(?<=info-value">)[0-9]+\.[0-9]+\.[0-9]+' script/content.js | head -1)

          echo "current=$VERSION" >> $GITHUB_OUTPUT

          if [ "$CHANNEL" = "patchnotes" ]; then
            echo "channel=patchnotes" >> $GITHUB_OUTPUT
            echo "webhook=${{ secrets.DISCORD_WEBHOOK_PATCHNOTES }}" >> $GITHUB_OUTPUT
            echo "mention=<@&1518368928370528256>" >> $GITHUB_OUTPUT
          else
            echo "channel=status" >> $GITHUB_OUTPUT
            echo "webhook=${{ secrets.DISCORD_WEBHOOK_STATUS }}" >> $GITHUB_OUTPUT
            echo "mention=<@&1518378825451311105>" >> $GITHUB_OUTPUT
          fi

      - name: Wait for GitHub Pages
        run: sleep 120

      - name: Send to Discord
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Erste Zeile (<!-- channel: ... -->) nicht an Discord schicken
          CONTENT=$(tail -n +2 patchnotes/pending.md)
          MENTION="${{ steps.channel.outputs.mention }}"
          CHANNEL="${{ steps.channel.outputs.channel }}"
          WEBHOOK="${{ steps.channel.outputs.webhook }}"

          BODY=$(jq -n --arg c "${MENTION}
          ${CONTENT}" '{content: $c}')

          if [ "$CHANNEL" = "status" ]; then
            EXISTING_ID="${{ vars.STATUS_MESSAGE_ID }}"
            SUCCESS=false

            if [ -n "$EXISTING_ID" ]; then
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
                -H "Content-Type: application/json" \
                -d "$BODY" \
                "${WEBHOOK}/messages/${EXISTING_ID}")
              if [ "$HTTP" = "200" ]; then
                echo "Status-Nachricht $EXISTING_ID aktualisiert."
                SUCCESS=true
              else
                echo "PATCH fehlgeschlagen (HTTP $HTTP), erstelle neue Nachricht."
              fi
            fi

            if [ "$SUCCESS" = "false" ]; then
              RESP=$(curl -s -X POST \
                -H "Content-Type: application/json" \
                -d "$BODY" \
                "${WEBHOOK}?wait=true")
              NEW_ID=$(echo "$RESP" | jq -r '.id // empty')
              if [ -n "$NEW_ID" ]; then
                gh api --method PATCH \
                  "repos/${{ github.repository }}/actions/variables/STATUS_MESSAGE_ID" \
                  -f value="$NEW_ID" 2>/dev/null || \
                gh api --method POST \
                  "repos/${{ github.repository }}/actions/variables" \
                  -f name="STATUS_MESSAGE_ID" -f value="$NEW_ID"
                echo "Neue Status-Nachricht erstellt: $NEW_ID"
              fi
            fi
          else
            curl -s -X POST \
              -H "Content-Type: application/json" \
              -d "$BODY" \
              "$WEBHOOK"
          fi

      - name: Archive patchnotes
        run: |
          VERSION="${{ steps.channel.outputs.current }}"
          cp patchnotes/pending.md "patchnotes/v${VERSION}.md"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "patchnotes/v${VERSION}.md"
          git commit -m "chore: archive patchnotes v${VERSION} [skip ci]"
          git push
